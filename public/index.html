<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mims — Avaliação de Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* MIMS Green — Pantone 5535 C */
  --mims:#0F3D32;
  --mims-mid:#1a5446;
  --mims-light:#7FAF9C;
  --mims-pale:rgba(31,61,58,0.12);
  --mims-border:rgba(127,175,156,0.18);
  /* Surfaces */
  --bg:#0A2E2A;
  --surface:#0d2c26;
  --surface2:#102820;
  --border:rgba(127,175,156,0.14);
  /* Text */
  --text:#d6e4e2;
  --muted:#5a8a7a;
  --cream:#e8dfd0;
  --gold:#c9a96e;
  /* Bubbles */
  --bub-ai:#0d2820;
  --bub-usr:#0f2e22;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(31,61,58,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 85%,rgba(31,61,58,.12) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── VIEW SWITCHER ── */
.view{display:none;height:100%;flex-direction:column;}
.view.active{display:flex;}

/* ── HEADER ── */
.hdr{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.5rem;border-bottom:1px solid var(--border);position:relative;z-index:2;background:rgba(10,15,14,.96);backdrop-filter:blur(16px);}
.logo{display:flex;align-items:center;gap:.7rem;cursor:pointer;}
.logo-mark{width:28px;height:28px;border:1.5px solid var(--mims-light);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:13px;height:13px;}
.logo-name{font-family:'Playfair Display',serif;font-size:1.05rem;letter-spacing:.18em;color:var(--mims-light);font-weight:400;}
.logo-sub{font-size:.58rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:300;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:.7rem;}
.prog-pill{font-size:.7rem;color:var(--muted);letter-spacing:.05em;background:rgba(31,61,58,.08);border:1px solid var(--border);border-radius:100px;padding:.28rem .8rem;}
.prog-pill span{color:var(--mims-light);}
.btn-painel{padding:.3rem .8rem;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;letter-spacing:.04em;}
.btn-painel:hover{border-color:var(--mims-light);color:var(--mims-light);}

/* ── CHAT ── */
.chat{flex:1;overflow-y:auto;padding:1.4rem;display:flex;flex-direction:column;gap:.9rem;position:relative;z-index:1;scroll-behavior:smooth;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:rgba(31,61,58,.3);border-radius:2px;}

/* ── MESSAGES ── */
.msg{display:flex;gap:.7rem;animation:msgIn .32s cubic-bezier(.2,.8,.4,1) both;max-width:640px;}
.msg.ai{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:500;margin-top:2px;}
.av.ai{background:var(--mims);border:1px solid var(--mims-light);color:#a8c8c4;}
.av.usr{background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.2);color:var(--gold);}
.bub{padding:.82rem .98rem;border-radius:17px;font-size:.92rem;line-height:1.72;font-weight:300;max-width:490px;}
.msg.ai .bub{background:var(--bub-ai);border:1px solid var(--border);border-top-left-radius:3px;color:var(--text);}
.msg.user .bub{background:var(--bub-usr);border:1px solid rgba(31,61,58,.3);border-top-right-radius:3px;color:#b8d0cd;}
.bub strong{color:#7ab8b2;font-weight:500;}
.bub em{color:var(--gold);font-style:normal;}

/* TYPING */
.dots{display:flex;gap:5px;align-items:center;padding:4px 2px;}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--mims-light);animation:dot 1.2s infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,60%,100%{opacity:.25;transform:scale(.8);}30%{opacity:1;transform:scale(1.15);}}

/* ── INPUT ZONE ── */
.izone{flex-shrink:0;padding:.85rem 1.5rem 1.3rem;border-top:1px solid var(--border);position:relative;z-index:2;background:rgba(10,15,14,.96);backdrop-filter:blur(16px);}
.opts{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem;}
.chip{padding:.42rem .9rem;border:1px solid var(--mims-border);border-radius:100px;background:rgba(31,61,58,.06);color:var(--text);font-size:.82rem;font-weight:300;cursor:pointer;transition:all .16s;font-family:'Outfit',sans-serif;}
.chip:hover{border-color:var(--mims-light);background:rgba(31,61,58,.15);color:#fff;}
.chip.sel{border-color:var(--mims-light);background:rgba(31,61,58,.22);color:#a8c8c4;font-weight:400;}
.multi-ok{display:none;margin-bottom:.6rem;}
.multi-ok.show{display:block;}
.btn-ok{padding:.48rem 1.15rem;background:var(--mims-mid);border:none;border-radius:100px;color:#c8e4e0;font-size:.83rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;}
.btn-ok:hover{background:var(--mims-light);}
.irow{display:flex;gap:.5rem;align-items:flex-end;}
.irow textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.72rem .92rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:.92rem;font-weight:300;resize:none;outline:none;line-height:1.5;min-height:44px;max-height:110px;transition:border-color .2s;}
.irow textarea:focus{border-color:var(--mims-light);}
.irow textarea::placeholder{color:var(--muted);}
.btn-send{width:40px;height:40px;border-radius:11px;background:var(--mims-mid);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .18s;}
.btn-send:hover{background:var(--mims-light);transform:scale(1.05);}
.btn-send:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.btn-send svg{width:16px;height:16px;fill:none;stroke:#c8e4e0;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.ihint{font-size:.7rem;color:var(--muted);text-align:center;margin-top:.42rem;}
.btn-skip{background:none;border:none;color:var(--muted);font-size:.7rem;cursor:pointer;text-decoration:underline;font-family:'Outfit',sans-serif;padding:0;}
.btn-skip:hover{color:var(--mims-light);}

/* ── REPORT ── */
.rep-wrap{max-width:600px;width:100%;align-self:center;}
.rep-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.8rem;margin-bottom:1rem;}
.rep-hdr{text-align:center;margin-bottom:1.4rem;padding-bottom:1.4rem;border-bottom:1px solid var(--border);}
.rep-brand{font-family:'Playfair Display',serif;font-size:1.4rem;letter-spacing:.2em;color:var(--mims-light);}
.rep-doc-title{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--cream);margin-top:.3rem;letter-spacing:.05em;}
.rep-sub{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:.2rem;}
.rep-name{font-size:.88rem;color:#7aa09c;margin-top:.65rem;font-weight:300;}
.rsec{margin-bottom:1.35rem;}
.rsec h3{font-family:'Playfair Display',serif;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mims-light);margin-bottom:.55rem;display:flex;align-items:center;gap:.5rem;}
.rsec h3::after{content:'';flex:1;height:1px;background:rgba(31,61,58,.25);}
.rtag{display:inline-block;padding:.26rem .72rem;border-radius:100px;font-size:.75rem;margin:.18rem;font-weight:400;}
.rtag.alert{background:rgba(180,80,60,.12);color:#d47060;border:1px solid rgba(180,80,60,.2);}
.rtag.neu{background:rgba(201,169,110,.08);color:var(--gold);border:1px solid rgba(201,169,110,.15);}
.rtag.pos{background:rgba(31,61,58,.15);color:#7ab8b2;border:1px solid rgba(31,61,58,.3);}
.rtext{font-size:.86rem;color:#7aa09c;line-height:1.72;font-weight:300;}
.rtext li{margin-bottom:.32rem;padding-left:.2rem;}
.rtext ul{padding-left:1rem;}
.rtext strong{color:var(--cream);font-weight:400;}
.rep-disclaimer{background:rgba(31,61,58,.06);border:1px solid var(--border);border-radius:11px;padding:.9rem;margin-top:.9rem;}
.rep-disclaimer p{font-size:.74rem;color:var(--muted);line-height:1.6;}
.rep-cta{background:linear-gradient(135deg,rgba(31,61,58,.15),rgba(201,169,110,.06));border:1px solid rgba(31,61,58,.3);border-radius:16px;padding:1.4rem;margin-top:1.2rem;}
.rep-cta h4{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);margin-bottom:.5rem;font-weight:400;}
.rep-cta p{font-size:.84rem;color:#7aa09c;line-height:1.6;margin-bottom:.8rem;font-weight:300;}
.rep-cta ul{text-align:left;margin:.5rem 0 1.1rem .8rem;}
.rep-cta li{font-size:.83rem;color:#7aa09c;margin-bottom:.28rem;font-weight:300;}
.btn-cta{display:block;width:100%;padding:.82rem;background:var(--mims-mid);color:#c8e4e0;border:none;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:.55rem;text-align:center;}
.btn-cta:hover{background:var(--mims-light);transform:translateY(-1px);}
.btn-pdf{display:flex;align-items:center;justify-content:center;gap:.5rem;width:100%;padding:.72rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:100px;font-family:'Outfit',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;}
.btn-pdf:hover{border-color:var(--mims-light);color:var(--mims-light);}

/* ── GESTANTE ── */
.gestante-card{background:linear-gradient(135deg,rgba(201,169,110,.08),rgba(31,61,58,.08));border:1px solid rgba(201,169,110,.2);border-radius:20px;padding:1.8rem;text-align:center;max-width:520px;align-self:center;}
.gestante-card .gc-icon{font-size:2rem;margin-bottom:.8rem;}
.gestante-card h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--gold);font-weight:400;margin-bottom:.8rem;}
.gestante-card p{font-size:.88rem;color:#7aa09c;line-height:1.7;margin-bottom:.7rem;font-weight:300;}
.gestante-card .trim-list{text-align:left;margin:.8rem auto;max-width:270px;padding:0;}
.gestante-card .trim-list li{font-size:.84rem;color:#7aa09c;margin-bottom:.45rem;list-style:none;}

/* ── LOADING ── */
.loading-msg{text-align:center;padding:2.5rem 1rem;font-family:'Playfair Display',serif;font-size:.95rem;color:var(--muted);font-style:italic;animation:pulse 2s ease-in-out infinite;align-self:center;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

/* ══════════════════════════════
   PAINEL DE CONTROLE
══════════════════════════════ */
#viewPainel{background:var(--bg);}
.painel-wrap{flex:1;overflow-y:auto;padding:1.5rem;}
.painel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;}
.painel-hdr h2{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--mims-light);font-weight:400;}
.search-wrap{display:flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:.4rem .9rem;width:260px;}
.search-wrap svg{flex-shrink:0;opacity:.5;}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:300;width:100%;}
.search-wrap input::placeholder{color:var(--muted);}
.painel-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:.88rem;font-weight:300;}
.painel-empty .pe-icon{font-size:2rem;margin-bottom:.8rem;opacity:.4;}
.records-grid{display:grid;gap:.7rem;}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.2rem;cursor:pointer;transition:all .18s;}
.rec-card:hover{border-color:var(--mims-light);background:rgba(31,61,58,.08);}
.rec-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.rec-name{font-size:.95rem;font-weight:500;color:var(--cream);}
.rec-date{font-size:.72rem;color:var(--muted);}
.rec-tags{display:flex;flex-wrap:wrap;gap:.3rem;}
.rec-tag{padding:.2rem .6rem;border-radius:100px;font-size:.7rem;background:rgba(31,61,58,.15);color:#7ab8b2;border:1px solid rgba(31,61,58,.25);}
.rec-queixa{font-size:.8rem;color:var(--muted);margin-top:.4rem;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-detail{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);}
.rec-detail.open{display:block;}
.detail-sec{margin-bottom:.8rem;}
.detail-sec-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--mims-light);margin-bottom:.35rem;}
.detail-sec p{font-size:.82rem;color:#7aa09c;font-weight:300;line-height:1.6;}
.stats-row{display:flex;gap:.6rem;margin-bottom:1.2rem;flex-wrap:wrap;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:.7rem 1rem;flex:1;min-width:100px;}
.stat-num{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--mims-light);}
.stat-lbl{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.btn-del{margin-top:.8rem;padding:.4rem .9rem;background:transparent;border:1px solid rgba(180,80,60,.25);border-radius:100px;color:#d47060;font-size:.75rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .18s;}
.btn-del:hover{background:rgba(180,80,60,.1);}
</style>
</head>

window.addEventListener('load',()=>setTimeout(intro,400));

function intro(){
  const t='Olá, seja muito bem-vinda 🌿\n\nEsse é um processo de avaliação profunda da sua saúde.\n\nVou te fazer algumas perguntas para entender melhor como seu corpo está funcionando.\n\n<strong>Quanto mais você detalhar, mais precisa será sua avaliação.</strong>\n\nVamos começar?';
  aiMsg(t);
  conversationHistory.push({role:'assistant',content:t.replace(/<[^>]+>/g,'')});
  setTimeout(()=>{curQ=0;showQ(QS[0]);},900);
}

// ═══════════
// MESSAGES
// ═══════════
function aiMsg(html,typing=false){
  const m=document.createElement('div');m.className='msg ai';
  const av=document.createElement('div');av.className='av ai';av.textContent='M';
  const b=document.createElement('div');b.className='bub';
  if(typing){b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';m.id='typingEl';}
  else b.innerHTML=html.replace(/\n/g,'<br>');
  m.appendChild(av);m.appendChild(b);chat.appendChild(m);scroll();return m;
}
function userMsg(txt){
  const m=document.createElement('div');m.className='msg user';
  const av=document.createElement('div');av.className='av usr';av.textContent='✦';
  const b=document.createElement('div');b.className='bub';b.textContent=txt;
  m.appendChild(av);m.appendChild(b);chat.appendChild(m);scroll();
}
function rmTyping(){const t=document.getElementById('typingEl');if(t)t.remove();}
function scroll(){setTimeout(()=>{chat.scrollTop=chat.scrollHeight;},60);}

// ═══════════
// SHOW Q
// ═══════════
function showQ(q){
  opts.innerHTML='';multiOk.classList.remove('show');multiSel=[];
  inp.value='';ihint.innerHTML='';btnSend.disabled=false;
  pCur.textContent=curQ+1;

  if(q.type==='single'){
    inp.style.display='none';btnSend.style.display='none';
    q.opts.forEach(o=>{
      const c=document.createElement('button');c.className='chip';c.textContent=o;
      c.onclick=()=>handleSingle(o,q);opts.appendChild(c);
    });
  }else if(q.type==='multi'){
    inp.style.display='none';btnSend.style.display='none';
    q.opts.forEach(o=>{
      const c=document.createElement('button');c.className='chip';c.textContent=o;
      c.onclick=()=>{
        c.classList.toggle('sel');
        if(c.classList.contains('sel'))multiSel.push(o);
        else multiSel=multiSel.filter(x=>x!==o);
        multiOk.classList.toggle('show',multiSel.length>0);
      };
      opts.appendChild(c);
    });
  }else{
    inp.style.display='';btnSend.style.display='';
    inp.placeholder=q.ph||'Escreva aqui…';
    if(q.opt)ihint.innerHTML=`Opcional — <button class="btn-skip" onclick="skipQ()">pular</button>`;
    setTimeout(()=>inp.focus(),100);
  }
}

function handleSingle(val,q){
  userMsg(val);answers[q.id]=val;
  conversationHistory.push({role:'user',content:val});
  if(q.id===17&&val==='Gestante'){gestanteFlow();return;}
  if(q.id===17&&val.includes('Amamentando'))isLactante=true;
  // Pular pergunta 39 se menstrua regularmente
  if(q.id===38&&(val==='Menstruo mensalmente e regularmente'||val==='Estou na menopausa'||val==='Estou entrando na menopausa')){
    answers[39]='(não aplicável)';
  }
  // Pular perguntas de anticoncepcional se não usa e nunca usou
  if(q.id===43&&val==='Não'){
    answers[44]='(não aplicável)';answers[45]='(não aplicável)';
  }
  if(q.id===46&&val==='Não'){answers[47]='(não aplicável)';}
  if(q.id===48&&val==='Não'){answers[49]='(não aplicável)';}
  proceed(val,q);
}
btnOk.onclick=()=>{
  if(!multiSel.length)return;
  const q=QS[curQ];const d=multiSel.join(', ');
  userMsg(d);answers[q.id]=multiSel.slice();
  conversationHistory.push({role:'user',content:d});
  proceed(d,q);
};
btnSend.onclick=sendTxt;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTxt();}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px';});
function sendTxt(){
  const v=inp.value.trim();if(!v||busy)return;
  const q=QS[curQ];userMsg(v);answers[q.id]=v;
  conversationHistory.push({role:'user',content:v});
  if(q.id===1)firstName=v.trim().split(' ')[0];
  proceed(v,q);
}
function skipQ(){
  const q=QS[curQ];answers[q.id]='(não respondida)';
  conversationHistory.push({role:'user',content:'(preferiu não responder)'});
  proceed('(não respondida)',q,true);
}

// ═══════════════════════════════════════════
// NÚCLEO — IA gera comentário em tempo real
// ═══════════════════════════════════════════
async function proceed(ans,q,skipped=false){
  busy=true;
  opts.innerHTML='';multiOk.classList.remove('show');
  inp.style.display='none';btnSend.style.display='none';ihint.innerHTML='';

  aiMsg('',true);

  // Avançar curQ pulando perguntas já respondidas automaticamente
  let nextIdx=curQ+1;
  while(nextIdx<QS.length && answers[QS[nextIdx].id]!==undefined && QS[nextIdx].opt){
    nextIdx++;
  }
  const isLast=(nextIdx>=QS.length);
  const nextQ=isLast?null:QS[nextIdx];

  const contextSummary=Object.entries(answers).slice(0,-1).map(([id,val])=>{
    const question=QS.find(x=>x.id==id);
    if(!question)return null;
    const v=Array.isArray(val)?val.join(', '):val;
    if(v==='(não aplicável)'||v==='(não respondida)')return null;
    return `${question.sec} — ${question.text.split('\n')[0].substring(0,60)}: ${v.substring(0,120)}`;
  }).filter(Boolean).join('\n');

  const sectionChange=nextQ&&nextQ.sec!==q.sec;
  const nextQText=nextQ?(sectionChange?`[Nova seção: ${nextQ.sec}]\n${nextQ.text}`:nextQ.text):null;

  let userPrompt;
  if(isLast){
    userPrompt=`A paciente acabou de responder a ÚLTIMA pergunta da anamnese MIMS.
Pergunta: "${q.text}"
Resposta: "${ans}"
Nome da paciente: ${firstName||'não informado'}

Contexto geral das respostas:
${contextSummary}

Escreva uma mensagem de encerramento (máximo 3 frases):
1. Um comentário genuíno e personalizado sobre esta resposta final ou sobre algo marcante que ela compartilhou
2. Agradecimento caloroso por ter se aberto e compartilhado
3. Informe que vai fazer a análise completa e gerar o relatório agora

NÃO use fórmulas genéricas. Conecte com o que ela trouxe ao longo da conversa.`;
  }else{
    userPrompt=`Você está conduzindo a anamnese metabólica sistêmica MIMS.

RESPOSTA ATUAL:
Seção: ${q.sec}
Pergunta: "${q.text.split('\n')[0]}"
Resposta: "${skipped?'(optou por não responder)':ans}"
Nome: ${firstName||'não informado ainda'}

CONTEXTO — respostas anteriores relevantes:
${contextSummary||'Início da conversa.'}

PRÓXIMA PERGUNTA:
${nextQText}
${sectionChange?'(Nova seção — mencione sutilmente se fizer sentido)':''}

Escreva UMA mensagem que:
1. Faça um comentário breve, genuíno e personalizado sobre a resposta atual (1-2 frases)
   - Se a resposta revelar sofrimento, dificuldade ou algo clinicamente relevante: acolha com empatia real
   - Se for identificação simples (nome, cidade, profissão): comentário leve, 1 frase apenas
   - Conecte com respostas anteriores quando houver algo relevante para conectar
2. Faça a próxima pergunta de forma natural, como uma terapeuta humana faria

REGRAS ABSOLUTAS:
- Máximo 4 frases no total
- NUNCA comece com "Entendido", "Anotado" ou "Obrigada" como abertura mecânica
- NUNCA diagnostique, prescreva ou afirme certezas clínicas
- Tom: terapeuta experiente, acolhedora, presente, humana`;
  }

  try{
    const response=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system:AGENT_SYSTEM,
        messages:[{role:'user',content:userPrompt}]
      })
    });
    const data=await response.json();
    const aiText=data.content.map(i=>i.text||'').join('').trim();
    rmTyping();
    conversationHistory.push({role:'assistant',content:aiText});
    aiMsg(aiText);
    if(isLast){
      setTimeout(()=>startReport(),1600);
    }else{
      curQ=nextIdx;
      busy=false;
      showQ(QS[curQ]);
    }
  }catch(e){
    rmTyping();
    const fb=nextQ?`Obrigada por compartilhar. 🌿\n\n${nextQ.text}`:`Obrigada por tudo. Sua avaliação está sendo gerada agora… 🌿`;
    aiMsg(fb);
    if(isLast){setTimeout(()=>startReport(),1600);}
    else{curQ=nextIdx;busy=false;showQ(QS[curQ]);}
  }
}

async function startReport(){
  izone.style.display='none';
  const loading=document.createElement('div');
  loading.className='loading-msg';
  loading.innerHTML='🌿 Fazendo sua análise metabólica sistêmica…';
  chat.appendChild(loading);scroll();

  const summary=QS.map(q=>{
    const a=answers[q.id];
    if(!a||a==='(não respondida)'||a==='(não aplicável)')return null;
    return `[${q.sec}] ${q.text.split('\n')[0].substring(0,80)}\nResposta: ${Array.isArray(a)?a.join(', '):a}`;
  }).filter(Boolean).join('\n\n');

  const reportPrompt=`Você é o MIMS — sistema de interpretação metabólica sistêmica.
NÃO é médico. NÃO diagnostica. Use linguagem de hipóteses funcionais.
NUNCA liste exames por nome específico. Use apenas: hemograma, perfil nutricional, avaliação hormonal, marcadores metabólicos e inflamatórios.

ANAMNESE COMPLETA de ${firstName||'a paciente'}:
${summary}
${isLactante?'\nATENÇÃO: Paciente amamentando.':''}

Gere JSON:
{
  "visao_geral":"2-3 frases sobre o perfil metabólico sistêmico usando linguagem de hipóteses",
  "achados":{
    "metabolico":["2-3 achados"],
    "inflamatorio":["1-2 padrões"],
    "hormonal":["2-3 padrões — inclua insights do ciclo menstrual se relevante"],
    "intestinal":["2-3 padrões"],
    "emocional":["1-2 padrões"]
  },
  "conexoes":["3-4 conexões sistêmicas — ex: 'X + Y sugerem possível Z'"],
  "hipoteses_funcionais":["3-4 hipóteses funcionais — nunca diagnósticos"],
  "direcao_exames":"Parágrafo com categorias gerais apenas",
  "mensagem_final":"2-3 frases acolhedoras e personalizadas para esta paciente específica",
  "lactante_obs":${isLactante?'"Observação sobre validação com pediatra"':"null"}
}
Retorne SOMENTE o JSON. Sem markdown.`;

  let report;
  try{
    const r=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1800,messages:[{role:'user',content:reportPrompt}]})
    });
    const d=await r.json();
    report=JSON.parse(d.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim());
  }catch(e){report=fallbackReport();}

  loading.remove();

  // Salvar no painel
  saveRecord(report);
  renderReport(report);
}

function saveRecord(report){
  const record={
    id:Date.now(),
    name:firstName||'Paciente',

// ═══════════
// PAINEL
// ═══════════
function renderPainel(){
  const q=document.getElementById('searchInp').value.toLowerCase().trim();
  const filtered=q?savedRecords.filter(r=>r.name.toLowerCase().includes(q)):savedRecords;
  const grid=document.getElementById('recordsGrid');
  const stats=document.getElementById('statsRow');

  stats.innerHTML=`
    <div class="stat-box"><div class="stat-num">${savedRecords.length}</div><div class="stat-lbl">Avaliações</div></div>
    <div class="stat-box"><div class="stat-num">${savedRecords.filter(r=>r.date===new Date().toLocaleDateString('pt-BR')).length}</div><div class="stat-lbl">Hoje</div></div>
    <div class="stat-box"><div class="stat-num">${savedRecords.filter(r=>{const d=r.date.split('/');const m=new Date(d[2],d[1]-1,d[0]);return (Date.now()-m)<30*86400000;}).length}</div><div class="stat-lbl">Este mês</div></div>`;

  if(!filtered.length){
    grid.innerHTML=`<div class="painel-empty"><div class="pe-icon">🌿</div>${q?'Nenhuma paciente encontrada para "'+q+'"':'Nenhuma avaliação registrada ainda.'}</div>`;
    return;
  }

  grid.innerHTML='';
  filtered.forEach(rec=>{
    const card=document.createElement('div');card.className='rec-card';
    const allTags=[...(rec.hipoteses||[])].slice(0,3);
    card.innerHTML=`
      <div class="rec-top">
        <div class="rec-name">${rec.name}</div>
        <div class="rec-date">${rec.date}</div>
      </div>
      <div class="rec-tags">${allTags.map(t=>`<span class="rec-tag">${t}</span>`).join('')}</div>
      <div class="rec-queixa">${rec.queixa||'Queixa não informada'}</div>
      <div class="rec-detail" id="detail-${rec.id}">
        <div class="detail-sec"><div class="detail-sec-title">Visão Geral</div><p>${rec.visao_geral||''}</p></div>
        <div class="detail-sec"><div class="detail-sec-title">Conexões Sistêmicas</div><p>${(rec.conexoes||[]).join(' · ')}</p></div>
        <div class="detail-sec"><div class="detail-sec-title">Direcionamento</div><p>${rec.direcao_exames||''}</p></div>
        <button class="btn-del" onclick="deleteRecord(${rec.id},event)">Excluir registro</button>
      </div>`;
    card.onclick=(e)=>{
      if(e.target.classList.contains('btn-del'))return;
      document.getElementById('detail-'+rec.id).classList.toggle('open');
    };
    grid.appendChild(card);
  });
}

function deleteRecord(id,e){
  e.stopPropagation();
  if(!confirm('Excluir este registro?'))return;
  savedRecords=savedRecords.filter(r=>r.id!==id);
  localStorage.setItem('mims_records',JSON.stringify(savedRecords));
  renderPainel();
}
